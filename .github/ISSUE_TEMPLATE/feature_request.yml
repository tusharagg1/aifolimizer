name: Feature request
description: New skill, MCP tool, or frontend capability
labels: [enhancement]
body:
  - type: input
    id: title
    attributes:
      label: Feature
      description: Short name (e.g. "Options flow skill", "Dividend growth screener")
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem it solves
      description: What investment decision or workflow does this improve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: MCP tools needed, analysis framework, output format
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: Layer
      options:
        - Skill (.claude/skills/)
        - MCP tool (backend/mcp_server.py)
        - Backend service (backend/app/services/)
        - Frontend component
        - Multiple layers
    validations:
      required: true
