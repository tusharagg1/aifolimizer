name: Bug report
description: Something broken in aifolimizer
labels: [bug]
body:
  - type: input
    id: component
    attributes:
      label: Component
      description: Where is the bug? (e.g. backend/recommendations, frontend/PortfolioTable, MCP/get_portfolio)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Actual vs expected behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start backend
        2. Call /api/recommendations
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or errors
      description: Paste error messages, stack traces (strip any PII/account data first)
      render: text

  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, Node version
      placeholder: "Windows 11, Python 3.12, Node 20"
