name: CI

on:
  push:
    branches: [master, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pyright pytest pytest-cov

      - name: Lint (ruff)
        run: ruff check . --output-format=github

      - name: Doc count drift guard
        run: python scripts/check_doc_counts.py

      - name: Pyright (advisory)
        run: pyright --pythonversion 3.12
        continue-on-error: true

      - name: Tests
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term
        if: hashFiles('backend/tests/**/*.py') != ''

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (backend/requirements.txt)
        run: pip-audit -r backend/requirements.txt --strict

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
