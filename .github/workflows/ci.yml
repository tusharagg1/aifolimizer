name: CI

on:
  push:
    branches: [master, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [master]

# Default to read-only; jobs that need write declare it explicitly. Stops a
# rogue dependency from creating PRs / pushing commits with the workflow token.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff pyright pytest pytest-cov

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Lint (ruff format)
        run: ruff format --check .

      - name: Doc count drift guard
        run: python scripts/check_doc_counts.py

      - name: Pyright
        run: pyright --pythonversion 3.12

      - name: Tests
        # tests/ is committed; explicit guard removed so a deleted suite fails
        # CI loudly instead of silently skipping (audit P2).
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit (backend/requirements.txt)
        run: pip-audit -r backend/requirements.txt --strict

      # TODO(supply-chain): pin to a 40-char commit SHA after verifying the
      # exact release we want from https://github.com/gitleaks/gitleaks-action/releases.
      # Floating @v2 lets the action's owner move the tag; SHA pinning makes
      # the version auditable.
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Forbid placeholder addresses in SECURITY.md / CODEOWNERS
        run: |
          if grep -RIn "example\.invalid\|<CITE_URL_HERE>\|<DATE>" SECURITY.md TRACK_RECORD.md 2>/dev/null; then
            echo "::error::Found placeholder strings in published docs"
            exit 1
          fi
