name: CI

on:
  push:
    branches: [master, "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: [master]

# Default to read-only; jobs that need write declare it explicitly. Stops a
# rogue dependency from creating PRs / pushing commits with the workflow token.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.lock

      # Hash-locked install reproduces the exact resolution captured in
      # `requirements.lock` and verifies every wheel by SHA256. Regenerate
      # via `bash backend/scripts/lock_deps.sh` whenever requirements.txt
      # changes (also runs in dependabot PRs).
      - name: Install dependencies (hash-locked)
        run: |
          pip install --upgrade pip
          pip install --require-hashes -r requirements.lock
          pip install ruff pyright pytest pytest-cov

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Lint (ruff format)
        run: ruff format --check .

      - name: Doc count drift guard
        run: python scripts/check_doc_counts.py

      - name: Pyright
        run: pyright --pythonversion 3.12

      - name: Tests
        # tests/ is committed; explicit guard removed so a deleted suite fails
        # CI loudly instead of silently skipping (audit P2).
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit

      # CVE-2025-69872 (diskcache pickle gadget) is mitigated in-tree by
      # forcing JSONDisk + dir mode 0700 in `cache_layer.py`. Documented
      # in SECURITY.md "Known Advisories"; --ignore so CI doesn't block on
      # an advisory we've already neutralised. Re-evaluate when diskcache
      # ships a real fix.
      - name: pip-audit (lockfile)
        run: |
          pip-audit -r backend/requirements.lock \
            --disable-pip \
            --ignore-vuln CVE-2025-69872 \
            --strict

      # SHA-pinned for supply-chain integrity. Verified via:
      #   git ls-remote https://github.com/gitleaks/gitleaks-action refs/tags/v3.0.0
      # Bump by re-running ls-remote against the next release tag.
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e  # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Forbid placeholder addresses in SECURITY.md / CODEOWNERS
        run: |
          if grep -RIn "example\.invalid\|<CITE_URL_HERE>\|<DATE>" SECURITY.md TRACK_RECORD.md 2>/dev/null; then
            echo "::error::Found placeholder strings in published docs"
            exit 1
          fi
